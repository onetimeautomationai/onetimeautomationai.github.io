<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One Time Automation</title>
  <meta name="description" content="One Time Automation — build it once, let it run." />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#0d1417" />
  <style>
    :root {
      /* Leo Does AI / One Time Automation channel palette */
      --bg:#0d1417; --fg:#f4f4f5;
      --accent:#e8823c; --accent-hi:#f4a468;
      --teal:#255c8e; --steel:#4d7491; --muted:#8ea6b2;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:
        radial-gradient(60% 55% at 50% 0%, rgba(232,130,60,0.10), transparent 70%),
        radial-gradient(70% 60% at 50% 120%, rgba(37,92,142,0.16), transparent 70%),
        var(--bg);
      color:var(--fg);
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; text-align:center; padding:2rem;
      -webkit-font-smoothing:antialiased;
    }
    .wrap { max-width:640px; }
    .logo { width:104px; height:104px; margin:0 auto 1.75rem; display:block; }
    .kicker { font-size:0.8rem; text-transform:uppercase; letter-spacing:0.16em; color:var(--muted); margin-bottom:1.1rem; }
    h1 { font-size:clamp(2.2rem,6.5vw,3.75rem); letter-spacing:-0.02em; line-height:1.05; }
    h1 .accent { color:var(--accent); }
    p { color:var(--muted); font-size:1.15rem; margin-top:1.25rem; line-height:1.6; }
    .rule { width:64px; height:3px; margin:1.75rem auto 0; border-radius:3px;
      background:linear-gradient(90deg, var(--accent), var(--accent-hi)); }
    .tag { margin-top:1.75rem; font-size:0.82rem; color:var(--steel); text-transform:uppercase; letter-spacing:0.15em; }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="logo.png" alt="Leo Does AI — One Time Automation" width="104" height="104" />
    <div class="kicker">Leo Does AI &nbsp;&times;&nbsp; One Time Automation AI</div>
    <h1>One Time <span class="accent">Automation</span></h1>
    <p>Build it once. Let it run. Site coming soon.</p>
    <div class="rule"></div>
    <div class="tag">Automate It Once. Own It Forever.</div>
  </main>
</body>
</html>
