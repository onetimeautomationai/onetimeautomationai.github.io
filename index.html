<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One Time Automation</title>
  <meta name="description" content="One Time Automation — build it once, let it run." />
  <style>
    :root { --bg:#0b0b0f; --fg:#f4f4f5; --accent:#6d5efc; --muted:#9a9aa5; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg); color:var(--fg);
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; text-align:center; padding:2rem;
    }
    .wrap { max-width:640px; }
    h1 { font-size:clamp(2rem,6vw,3.5rem); letter-spacing:-0.02em; line-height:1.05; }
    .accent { color:var(--accent); }
    p { color:var(--muted); font-size:1.15rem; margin-top:1.25rem; line-height:1.6; }
    .tag { margin-top:2rem; font-size:0.85rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.15em; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>One Time <span class="accent">Automation</span></h1>
    <p>Build it once. Let it run. Site coming soon.</p>
    <div class="tag">One Time Automation</div>
  </main>
</body>
</html>
